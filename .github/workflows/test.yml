name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build memoryctl
        run: make build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck across repo
        run: |
          # -S error: only fail on hard errors.
          # SC1091: "Not following sourced file" — expected for runtime-sourced libs.
          find . -type f -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./docs/*" \
            -print0 \
          | xargs -0 shellcheck -e SC1091 -S error
